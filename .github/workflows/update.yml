# ============================================
# 주식레이더 자동 업데이트 (월~금 장마감 후)
# ============================================
# 실행 조건:
#   1. 매일 16:10 KST (월~금) 자동 실행
#   2. GitHub에서 "Run workflow" 버튼으로 수동 실행
#
# 필요한 시크릿:
#   - GEMINI_API_KEY: Google AI Studio에서 발급한 API 키
# ============================================

name: Stock Radar Daily Update

on:
  schedule:
    # UTC 07:10 = KST 16:10 (월~금)
    - cron: '10 7 * * 1-5'
  workflow_dispatch:  # 수동 실행 버튼

permissions:
  contents: write  # 자동 커밋에 필요

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 1단계 - 시세 수집
        run: python scripts/fetch.py

      - name: 2단계 - 분석 (Top30 + 섹터)
        run: python scripts/analysis.py

      - name: 3단계 - AI 피드 생성
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/feed.py

      - name: 4단계 - HTML 빌드
        run: python scripts/build.py

      - name: 5단계 - 자동 커밋 & 푸시
        run: |
          git config user.name "stock-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "📡 auto: $(date +'%Y-%m-%d') 업데이트"
          git push
