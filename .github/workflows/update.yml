name: Stock Radar Daily Update

on:
  schedule:
    - cron: '10 7 * * 1-5'   # 16:10 KST 월~금
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 1단계 - 시세 수집
        run: python scripts/fetch.py

      - name: 2단계 - 분석
        run: python scripts/analysis.py

      - name: 3단계 - AI 피드 생성
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/feed.py

      - name: 4단계 - HTML 빌드
        run: python scripts/build.py

      - name: 5단계 - 자동 커밋
        run: |
          git config user.name "stock-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "auto: $(date +'%Y-%m-%d') 업데이트"
          git push

      - name: 6단계 - Pages 배포
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
